services:
  api:
    build:
      context: .
      args:
        ENVIRONMENT: development
    container_name: nexcore_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      args:
        ENVIRONMENT: development
    container_name: nexcore_worker
    command: python worker.py
    depends_on:
      - rabbitmq
      - db
    env_file:
      - .env
    volumes:
      - .:/app
      - ./uploads:/app/uploads

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexcore_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  db:
    image: postgres:15-alpine
    container_name: nexcore_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Architectural Security Boundary: Localhost binding for secure SSH tunneling
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nexcore_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: