name: NexCore CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linter
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Inspect Syntax (Flake8)
      run: |
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Build and Run Infrastructure
      run: |
        # Architectural Fix: Filter out REDIS_URL to prevent empty string interpolation causing silent test pollution
        grep -v "^DATABASE_URL=" .env.example | grep -v "^SECRET_KEY=" | grep -v "^POSTGRES_" | grep -v "^ALGORITHM=" | grep -v "^REDIS_URL=" > .env
        
        # Inject Mandatory PostgreSQL boot credentials
        echo "POSTGRES_USER=postgres" >> .env
        echo "POSTGRES_PASSWORD=postgres" >> .env
        echo "POSTGRES_DB=nexcore_test" >> .env
        
        # Inject API connection, Cache, and Security credentials
        echo "DATABASE_URL=postgresql://postgres:postgres@db:5432/nexcore_test" >> .env
        echo "REDIS_URL=redis://redis:6379/0" >> .env
        echo "SECRET_KEY=super_secret_ci_testing_key_123" >> .env
        echo "ALGORITHM=HS256" >> .env
        
        docker compose build
        docker compose up -d

    - name: Wait for Database Initialization
      run: sleep 10

    - name: Execute Migrations (Alembic)
      run: |
        docker compose exec -T api alembic upgrade head

    - name: Execute Automated Test Suite (Pytest)
      run: |
        docker compose exec -T api python -m pytest tests/