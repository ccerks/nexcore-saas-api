version: '3.8'

services:
  api:
    build: .
    container_name: nexcore_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app # Maps the local root repository into the container workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    container_name: nexcore_worker
    command: python worker.py
    depends_on:
      - rabbitmq
      - db
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads # Persists uploaded binary assets inside the worker environment

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexcore_rabbitmq
    ports:
      - "5672:5672"   # Message broker AMQP protocol port
      - "15672:15672" # RabbitMQ Management Web UI dashboard
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  db:
    image: postgres:15-alpine
    container_name: nexcore_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Architectural Security Boundary: Binds custom host port 5433 strictly to loopback interface.
      # Maps host 127.0.0.1:5433 securely to the container's internal PostgreSQL port 5432.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Volume mount for database persistence

  redis:
    image: redis:7-alpine
    container_name: nexcore_redis
    restart: always
    ports:
      - "6379:6379" # In-memory key-value cache and rate-limiting store

volumes:
  postgres_data: # Declared named volume for durable database state preservation