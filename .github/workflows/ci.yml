name: NexCore CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linter
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Inspect Syntax (Flake8)
      run: |
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Build and Run Infrastructure
      run: |
        cp .env.example .env
        
        # Architectural Fix: Dynamically inject test database credentials into the CI environment
        echo "SQLALCHEMY_DATABASE_URL=postgresql://postgres:postgres@db:5432/nexcore_test" >> .env
        echo "SECRET_KEY=super_secret_ci_testing_key_123" >> .env
        
        docker compose build
        docker compose up -d

    - name: Wait for Database Initialization
      run: sleep 10

    - name: Execute Migrations (Alembic)
      run: |
        # Ensures the global public schema and dynamic routing are intact
        docker compose exec -T api alembic upgrade head

    - name: Execute Automated Test Suite (Pytest)
      run: |
        # Runs isolated tests across endpoints and database layers
        docker compose exec -T api pytest